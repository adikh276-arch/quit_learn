<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="title">Learn - QuitMantra</title>
<script>
  // Fix relative paths for subpath deployments (e.g. /quit_learn -> /quit_learn/)
  if (window.location.pathname.endsWith('/quit_learn')) {
    window.location.replace(window.location.pathname + '/' + window.location.search);
  }
</script>
<script src="i18n/loader.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--blue:#4F46E5;--blue-d:#4338CA;--blue-l:#EEF2FF;--blue-xl:#F5F3FF;--ink:#0F172A;--ink-2:#334155;--ink-3:#64748B;--ink-4:#94A3B8;--border:#E2E8F0;--bg:#FFFFFF;--bg-2:#F8FAFC;--bg-3:#F1F5F9;--green:#16A34A;--green-l:#DCFCE7;--green-b:#86EFAC;--red-l:#FEF2F2;--red-b:#FECACA;--red:#DC2626;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;}
#main-nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 20px;}
.nav-logo{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-.4px;}.nav-logo span{color:var(--blue);}
.nav-tab-row{margin-left:auto;display:flex;align-items:center;gap:2px;}
.nav-tab{font-size:12.5px;font-weight:500;color:var(--ink-3);padding:5px 12px;border-radius:100px;border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.nav-tab:hover{color:var(--ink);background:var(--bg-3);}.nav-tab.active{color:var(--blue);background:var(--blue-l);font-weight:600;}
#view-list{padding-bottom:56px;}.page-wrap{max-width:540px;margin:0 auto;}
.pills-outer{overflow-x:auto;padding:18px 20px 6px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}.pills-outer::-webkit-scrollbar{display:none;}
.pills-inner{display:flex;gap:8px;}
.pill{flex-shrink:0;padding:8px 18px;border-radius:100px;border:none;font-size:13.5px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s;background:rgba(79,70,229,.09);color:var(--blue);white-space:nowrap;}
.pill:hover{background:rgba(79,70,229,.15);}.pill.on{background:var(--blue);color:white;box-shadow:0 2px 12px rgba(79,70,229,.3);}
.crs-card{margin:14px 16px 22px;background:var(--blue-l);border-radius:20px;padding:22px 22px 20px;}
.crs-title{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;color:var(--ink);margin-bottom:16px;line-height:1.3;letter-spacing:-.3px;}
.crs-prog-track{height:6px;background:rgba(79,70,229,.16);border-radius:3px;margin-bottom:8px;overflow:hidden;}
.crs-prog-fill{height:100%;background:var(--blue);border-radius:3px;width:0%;transition:width .45s ease;}
.crs-prog-row{display:flex;justify-content:space-between;font-size:12.5px;color:#6366F1;}
.crs-prog-count{font-weight:600;color:var(--blue);}
.crs-continue{display:none;margin-top:14px;background:var(--blue);color:white;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;align-items:center;gap:6px;transition:background .15s;}
.crs-continue.vis{display:inline-flex;}.crs-continue:hover{background:var(--blue-d);}
.phases{padding:0 16px;}.phase-blk{margin-bottom:28px;}
.phase-hd{display:flex;align-items:baseline;gap:9px;margin-bottom:10px;}
.phase-num{font-size:22px;font-weight:800;color:var(--blue);}
.phase-lbl{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;color:var(--ink);letter-spacing:-.3px;}
.phase-rule{border:none;border-top:1.5px solid var(--border);margin-bottom:12px;}
.lessons-col{display:flex;flex-direction:column;gap:7px;}
.lc{background:var(--bg-2);border:1px solid var(--border);border-radius:13px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;user-select:none;}
.lc:hover{background:var(--blue-xl);border-color:rgba(79,70,229,.3);transform:translateX(2px);box-shadow:0 2px 8px rgba(79,70,229,.08);}
.lc:active{transform:translateX(0);}
.lc-ico{width:40px;height:40px;border-radius:11px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.lc.done .lc-ico{background:var(--green-l);}.lc-body{flex:1;min-width:0;}
.lc-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.35;margin-bottom:3px;}
.lc-meta{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-3);}
.meta-dot{width:3px;height:3px;background:var(--ink-4);border-radius:50%;}
#view-art{position:fixed;inset:0;background:var(--bg);z-index:150;overflow-y:auto;display:none;}
#view-art.open{display:block;animation:artIn .2s ease both;}
@keyframes artIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.art-bar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:5px;padding:7px 14px 7px 10px;background:var(--bg-2);border:1px solid var(--border);border-radius:100px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--ink-2);cursor:pointer;white-space:nowrap;transition:all .15s;}
.back-btn:hover{border-color:var(--blue);color:var(--blue);}
.read-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.read-fill{height:100%;background:var(--blue);width:0%;border-radius:2px;transition:width .08s linear;}
.art-pg{max-width:540px;margin:0 auto;padding:28px 20px 72px;}
.art-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--blue);margin-bottom:10px;}
.art-h1{font-family:'DM Serif Display',serif;font-size:clamp(24px,5.5vw,32px);font-weight:400;color:var(--ink);line-height:1.2;letter-spacing:-.3px;margin-bottom:14px;}
.art-meta{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-3);padding-bottom:22px;border-bottom:1px solid var(--border);margin-bottom:26px;}
.art-body h2{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;color:var(--ink);letter-spacing:-.3px;line-height:1.3;margin:32px 0 12px;}
.art-body h2:first-child{margin-top:0;}
.art-body p{font-size:16px;line-height:1.85;color:var(--ink-2);margin-bottom:15px;}
.art-body strong{color:var(--ink);font-weight:600;}
.art-body ul{list-style:none;padding:0;margin:0 0 16px;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.art-body ul li{font-size:15.5px;line-height:1.7;color:var(--ink-2);padding:12px 16px 12px 42px;border-bottom:1px solid var(--border);position:relative;}
.art-body ul li:last-child{border-bottom:none;}
.art-body ul li::before{content:'';position:absolute;left:14px;top:19px;width:10px;height:10px;background:var(--blue);border-radius:50%;opacity:.45;}
.quiz-card{text-align:center;padding:28px 0;}
.quiz-ico{width:60px;height:60px;border-radius:18px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.quiz-card h2{font-family:'DM Serif Display',serif;font-size:23px;font-weight:400;margin-bottom:10px;letter-spacing:-.3px;}
.quiz-card p{font-size:15px;color:var(--ink-3);line-height:1.7;margin-bottom:22px;}
.quiz-card-btn{background:var(--blue);color:white;border:none;border-radius:12px;padding:13px 32px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s;}
.quiz-card-btn:hover{background:var(--blue-d);}
.art-footer{margin-top:40px;padding-top:26px;border-top:1px solid var(--border);}
.done-btn{width:100%;padding:13px;background:var(--blue);color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px;transition:all .2s;}
.done-btn:hover:not(.completed){background:var(--blue-d);transform:translateY(-1px);}
.done-btn.completed{background:var(--green-l);color:var(--green);cursor:default;transform:none;}
.fb-box{text-align:center;}.fb-q{font-size:14px;font-weight:600;color:var(--ink-2);margin-bottom:12px;}.fb-row{display:flex;gap:10px;}
.fb-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px;background:var(--bg-2);border:1.5px solid var(--border);border-radius:11px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--ink-2);cursor:pointer;transition:all .15s;}
.fb-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-xl);}
.fb-btn.yes{background:var(--green-l);border-color:var(--green-b);color:var(--green);}
.fb-btn.no{background:var(--red-l);border-color:var(--red-b);color:var(--red);}
.fb-thanks{font-size:12.5px;color:var(--ink-4);margin-top:10px;display:none;}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-90px);background:white;border:1px solid var(--border);border-left:4px solid var(--green);border-radius:12px;padding:12px 18px;font-size:14px;font-weight:600;color:var(--green);box-shadow:0 8px 32px rgba(0,0,0,.1);display:flex;align-items:center;gap:9px;z-index:999;white-space:nowrap;transition:transform .32s cubic-bezier(.34,1.56,.64,1),opacity .25s ease;opacity:0;}
#toast.in{transform:translateX(-50%) translateY(0);opacity:1;}#toast.out{transform:translateX(-50%) translateY(-90px);opacity:0;}
@media(max-width:480px){.crs-card{margin:14px 12px 20px;}.phases{padding:0 12px;}.pills-outer{padding:16px 12px 6px;}.art-pg{padding:22px 16px 60px;}}
</style>
</head>
<body>
<nav id="main-nav">
  <div class="nav-logo">Quit<span>Mantra</span></div>
  <div class="nav-tab-row">
    <button class="nav-tab" onclick="window.open('./quitmantra-quiz-blue.html','_self')" data-i18n="nav_quiz">Quiz</button>
    <button class="nav-tab active" data-i18n="nav_learn">Learn</button>
  </div>
</nav>
<div id="toast">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.2"/><path d="M5 8l2.5 2.5 4-4" stroke="#16A34A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span id="toast-txt" data-i18n="toast_lesson_completed">Lesson completed!</span>
</div>
<div id="view-list">
  <div class="page-wrap">
    <div class="pills-outer"><div class="pills-inner" id="pills"></div></div>
    <div class="crs-card">
      <div class="crs-title" id="crs-title"></div>
      <div class="crs-prog-track"><div class="crs-prog-fill" id="crs-fill"></div></div>
      <div class="crs-prog-row"><span id="crs-pct">Completed 0%</span><span class="crs-prog-count" id="crs-cnt"></span></div>
      <button class="crs-continue" id="crs-cont" onclick="continueCourse()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2.5 6.5h8M6.5 2.5l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span data-i18n="btn_continue">Continue</span>
      </button>
    </div>
    <div class="phases" id="phases"></div>
  </div>
</div>
<div id="view-art">
  <div class="art-bar">
    <button class="back-btn" onclick="closeArt()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8.5 10.5L4.5 6.5l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span data-i18n="btn_back">Back</span>
    </button>
    <div class="read-track"><div class="read-fill" id="read-fill"></div></div>
  </div>
  <div class="art-pg">
    <div class="art-eyebrow" id="art-eye"></div>
    <h1 class="art-h1" id="art-h1"></h1>
    <div class="art-meta">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 4v2.8l1.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span id="art-time"></span>
    </div>
    <div class="art-body" id="art-body"></div>
    <div class="art-footer" id="art-footer">
      <button class="done-btn" id="done-btn" onclick="markDone()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span data-i18n="btn_mark_complete">Mark as Complete</span>
      </button>
      <div class="fb-box">
        <div class="fb-q" data-i18n="fb_q">Was this lesson helpful?</div>
        <div class="fb-row">
          <button class="fb-btn" id="fb-y" onclick="giveFb(true)">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M4.5 7.5V12.5M4.5 7.5l2-3.5a1.5 1.5 0 012.5 1.5V7h3l-1 5H4.5M2 7.5h2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg><span data-i18n="fb_yes">Yes</span>
          </button>
          <button class="fb-btn" id="fb-n" onclick="giveFb(false)">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M10.5 7.5V2.5M10.5 7.5l-2 3.5a1.5 1.5 0 01-2.5-1.5V8h-3l1-5h7M13 7.5h-2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg><span data-i18n="fb_no">No</span>
          </button>
        </div>
        <div class="fb-thanks" id="fb-thanks" data-i18n="fb_thanks">Thank you for your feedback!</div>
      </div>
    </div>
  </div>
</div>

<script>
// Use get-prefixed vars to access translated data
const getSUBS = () => t('subs', []);
const getCURR = () => t('curr', []);
const getARTICLES = () => t('articles', {});

let sub = null;
let curLess = null;
const done = {};
const fb = {};

// We'll initialize these after language is loaded
window.addEventListener('languageChanged', (e) => {
  const SUBS = getSUBS();
  if (SUBS.length > 0) {
    if (!sub) {
      // Default to cannabis or first sub
      sub = SUBS.find(s => s.slug === 'cannabis') || SUBS[0];
    } else {
      // Refresh current sub object from new language data
      sub = SUBS.find(s => s.slug === sub.slug) || SUBS[0];
    }
    SUBS.forEach(s => { if (!done[s.slug]) done[s.slug] = new Set(); });
    buildPills();
    buildCourse();
  }
});

function init() {
  // languageChanged event will trigger the builds
  document.getElementById('view-art').addEventListener('scroll', () => {
    const el = document.getElementById('view-art');
    const pct = (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100 || 0;
    document.getElementById('read-fill').style.width = Math.min(100, pct) + '%';
  });
}

function buildPills() {
  const SUBS = getSUBS();
  document.getElementById('pills').innerHTML = SUBS.map(s =>
    `<button class="pill${s.slug === sub.slug ? ' on' : ''}" onclick="pickSub('${s.slug}')">${s.name}</button>`
  ).join('');
  setTimeout(() => {
    const el = document.querySelector('.pill.on');
    if (el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 60);
}

function pickSub(slug) {
  const SUBS = getSUBS();
  sub = SUBS.find(s => s.slug === slug);
  buildPills();
  buildCourse();
}

function buildCourse() {
  const CURR = getCURR();
  document.getElementById('crs-title').textContent = sub.course;
  syncProgress();
  document.getElementById('phases').innerHTML = CURR.map(p => `
    <div class="phase-blk">
      <div class="phase-hd"><span class="phase-num">${p.num}.</span><span class="phase-lbl">${p.phase}</span></div>
      <hr class="phase-rule">
      <div class="lessons-col">${p.lessons.map(cardHTML).join('')}</div>
    </div>`).join('');
}

function cardHTML(l) {
  const isDone = done[sub.slug] && done[sub.slug].has(l.id);
  const title = l.title.replace(/\[S\]/g, sub.name);
  const doneIco = `<svg width="19" height="19" viewBox="0 0 19 19" fill="none"><path d="M4 9.5l3.5 3.5 8-8" stroke="#16A34A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const quizIco = `<svg width="19" height="19" viewBox="0 0 19 19" fill="none"><rect x="3.5" y="2.5" width="12" height="14" rx="2" stroke="#4F46E5" stroke-width="1.4"/><path d="M6.5 6.5h3M6.5 9.5h2M12 9.5l2 2.5-2 2" stroke="#4F46E5" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const artIco = `<svg width="19" height="19" viewBox="0 0 19 19" fill="none"><rect x="3.5" y="2.5" width="12" height="14" rx="2" stroke="#4F46E5" stroke-width="1.4"/><path d="M6.5 6.5h6M6.5 9.5h6M6.5 13h4" stroke="#4F46E5" stroke-width="1.3" stroke-linecap="round"/></svg>`;
  const ico = isDone ? doneIco : l.isQuiz ? quizIco : artIco;
  const right = isDone
    ? `<div style="width:21px;height:21px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5 4-4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`
    : `<svg width="15" height="15" viewBox="0 0 15 15" fill="none" style="flex-shrink:0;color:var(--ink-4)"><path d="M5.5 3.5l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  return `<div class="lc${isDone ? ' done' : ''}" onclick="openLesson('${l.id}')">
    <div class="lc-ico">${ico}</div>
    <div class="lc-body">
      <div class="lc-title">${title}</div>
      <div class="lc-meta">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="4.2" stroke="currentColor" stroke-width="1.1"/><path d="M5.5 3.5v2.2l1.5 1.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
        ${l.mins} ${t('art_min_read')}<span class="meta-dot"></span>${l.type}
      </div>
    </div>${right}</div>`;
}

function syncProgress() {
  const CURR = getCURR();
  const ALL_LESSONS = CURR.flatMap(p => p.lessons);
  const TOTAL = ALL_LESSONS.length;
  const n = done[sub.slug] ? done[sub.slug].size : 0;
  const pct = Math.round(n / TOTAL * 100) || 0;
  document.getElementById('crs-fill').style.width = pct + '%';
  document.getElementById('crs-pct').textContent = t('crs_completed') + pct + '%';
  document.getElementById('crs-cnt').textContent = n > 0 ? `${n} / ${TOTAL}${t('crs_lessons')}` : '';
  document.getElementById('crs-cont').classList.toggle('vis', n > 0 && n < TOTAL);
}

function openLesson(id) {
  const CURR = getCURR();
  const ALL_LESSONS = CURR.flatMap(p => p.lessons);
  const lesson = ALL_LESSONS.find(l => l.id === id); if (!lesson) return;
  curLess = { sub, lesson };
  const artEl = document.getElementById('view-art');
  artEl.classList.add('open'); artEl.scrollTop = 0;
  document.getElementById('main-nav').style.display = 'none';
  document.getElementById('read-fill').style.width = '0%';
  const phase = CURR.find(p => p.lessons.some(l => l.id === id));
  document.getElementById('art-eye').textContent = phase?.phase || '';
  document.getElementById('art-h1').textContent = lesson.title.replace(/\[S\]/g, sub.name);
  document.getElementById('art-time').textContent = `${lesson.mins}${t('art_min_read')}`;
  if (lesson.isQuiz) { showQuizCard(); } else { showArticle(lesson.id); }
  syncDoneBtn(); syncFbBtns();
}

function closeArt() {
  document.getElementById('view-art').classList.remove('open');
  document.getElementById('view-art').scrollTop = 0;
  document.getElementById('main-nav').style.display = '';
  buildCourse(); curLess = null;
}

function continueCourse() {
  const CURR = getCURR();
  for (const p of CURR) for (const l of p.lessons) if (!done[sub.slug].has(l.id)) { openLesson(l.id); return; }
}

function showArticle(id) {
  const ARTICLES = getARTICLES();
  const raw = ARTICLES[id] || '<p>Content coming soon.</p>';
  document.getElementById('art-body').innerHTML = raw.replace(/\[S\]/g, sub.name);
  document.getElementById('art-footer').style.display = 'block';
}

function showQuizCard() {
  const quizTitle = t('quiz_title');
  const quizDesc = t('quiz_desc_prefix') + sub.name.toLowerCase() + t('quiz_desc_suffix');
  const quizBtn = t('quiz_btn');
  
  document.getElementById('art-body').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-ico"><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect x="4" y="3" width="18" height="20" rx="3" stroke="#4F46E5" stroke-width="1.7"/><path d="M8 9h10M8 13h6M15 17l2.5 2.5-2.5 2.5" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <h2>${quizTitle}</h2>
      <p>${quizDesc}</p>
      <button class="quiz-card-btn" onclick="window.open('./quitmantra-quiz-blue.html#substance=${sub.slug}&view=quiz','_blank')">${quizBtn}</button>
    </div>`;
  document.getElementById('art-footer').style.display = 'block';
}

function markDone() {
  if (!curLess) return;
  const { sub: s, lesson } = curLess;
  if (done[s.slug].has(lesson.id)) return;
  done[s.slug].add(lesson.id);
  toast(t('toast_lesson_completed', 'Lesson completed!')); syncDoneBtn();
}

function syncDoneBtn() {
  if (!curLess) return;
  const isDone = done[curLess.sub.slug].has(curLess.lesson.id);
  const btn = document.getElementById('done-btn').querySelector('span');
  btn.textContent = isDone ? t('btn_completed') : t('btn_mark_complete');
}

function giveFb(yes) {
  if (!curLess) return;
  const key = `${curLess.sub.slug}:${curLess.lesson.id}`;
  fb[key] = yes;
  document.getElementById('fb-y').classList.toggle('yes', yes);
  document.getElementById('fb-n').classList.toggle('no', !yes);
  document.getElementById('fb-thanks').style.display = 'block';
}

function syncFbBtns() {
  if (!curLess) return;
  const val = fb[`${curLess.sub.slug}:${curLess.lesson.id}`];
  document.getElementById('fb-y').classList.toggle('yes', val === true);
  document.getElementById('fb-n').classList.toggle('no', val === false);
  document.getElementById('fb-thanks').style.display = val !== undefined ? 'block' : 'none';
}

let tTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  document.getElementById('toast-txt').textContent = msg;
  clearTimeout(tTimer);
  el.classList.remove('out'); el.classList.add('in');
  tTimer = setTimeout(() => { el.classList.remove('in'); el.classList.add('out'); }, 2700);
}

init();
</script>
</body>
</html>
