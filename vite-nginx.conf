server {
    listen 80;

    # Support all module paths
    location /alcohol-learn/ {
        alias /usr/share/nginx/html/alcohol-learn/;
        index index.html;
        try_files $uri $uri/ /alcohol-learn/index.html;
    }

    location /nic-learn/ {
        alias /usr/share/nginx/html/nic-learn/;
        index index.html;
        try_files $uri $uri/ /nic-learn/index.html;
    }

    location /opi-learn/ {
        alias /usr/share/nginx/html/opi-learn/;
        index index.html;
        try_files $uri $uri/ /opi-learn/index.html;
    }

    location /can-learn/ {
        alias /usr/share/nginx/html/can-learn/;
        index index.html;
        try_files $uri $uri/ /can-learn/index.html;
    }

    location /stim-learn/ {
        alias /usr/share/nginx/html/stim-learn/;
        index index.html;
        try_files $uri $uri/ /stim-learn/index.html;
    }

    location /mdma-learn/ {
        alias /usr/share/nginx/html/mdma-learn/;
        index index.html;
        try_files $uri $uri/ /mdma-learn/index.html;
    }

    location /kratom-learn/ {
        alias /usr/share/nginx/html/kratom-learn/;
        index index.html;
        try_files $uri $uri/ /kratom-learn/index.html;
    }

    # Root fallback
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
