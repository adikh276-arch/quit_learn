server {
    listen 80;
    server_name localhost;
    include /etc/nginx/mime.types;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect /quit_learn to /quit_learn/ (enforces trailing slash for correct relative paths)
    location = /quit_learn {
        return 301 /quit_learn/;
    }

    # Content for the subpath
    location /quit_learn/ {
        try_files $uri $uri/ /quit_learn/index.html;
    }

    # Optional: Root fallback
    location / {
        root /usr/share/nginx/html/quit_learn;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|json)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html/quit_learn;
    }
}
